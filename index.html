        .work-btn:hover { background: var(--primary); transform: translateY(-5px); }
        .tg-link-box { text-align: center; padding: 60px 20px; background: rgba(255,255,255,0.02); border-radius: 30px; margin-top: 40px; }
        .tg-url { color: var(--primary); font-size: 1.5rem; font-weight: 800; text-decoration: none; border-bottom: 2px solid var(--primary); padding-bottom: 5px; }
        footer { text-align: center; padding: 60px 20px; color: var(--gray); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; }
